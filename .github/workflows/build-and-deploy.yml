      #   run: |
      #     if [[ ! "$AWS_ROLE_ARN" =~ ^arn:aws:iam::[0-9]{12}:role/.+ ]]; then
      #       echo "AWS_ROLE_ARN is missing or is not an IAM role ARN: $AWS_ROLE_ARN"
      #       exit 1
      #     fi

      #     echo "AWS role ARN: $AWS_ROLE_ARN"

