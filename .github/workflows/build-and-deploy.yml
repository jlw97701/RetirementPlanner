      #       const safeClaims = {
      #         iss: claims.iss,
      #         aud: claims.aud,
      #         sub: claims.sub,
      #         repository: claims.repository,
      #         repository_owner: claims.repository_owner,
      #         ref: claims.ref,
      #         workflow: claims.workflow,
      #         job_workflow_ref: claims.job_workflow_ref
      #       };
      #       console.log("GitHub OIDC claims:");
      #       console.log(JSON.stringify(safeClaims, null, 2));
      #     '

      - name: Configure temporary AWS credentials
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          role-session-name: retirement-planner-deployment
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Upload application to S3
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: aws s3 sync dist/ "s3://${S3_BUCKET}/" --delete

      - name: Refresh CloudFront
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: >
          aws cloudfront create-invalidation
          --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}"
          --paths "/*"
